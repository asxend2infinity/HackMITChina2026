[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
    h2zero/NimBLE-Arduino
    olikraus/U8g2
build_flags =
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=8
board_build.filesystem = spiffs